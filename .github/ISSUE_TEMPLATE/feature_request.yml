name: Feature Request
description: Propose an improvement aligned with local-first Matryca Plumber
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Matryca Plumber is **local-first**, **database-free**, and **Logseq OG–native**.
        Features that require a hosted database, cloud sync as a hard dependency, or unstructured page blobs are usually out of scope.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What pain point or gap does this address? Who benefits?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Concrete behavior — tools, daemon modules, docs, or UI changes.
    validations:
      required: true

  - type: textarea
    id: paradigm_alignment
    attributes:
      label: How does this align with local-first, zero-auxiliary-db philosophy?
      description: Explain why the feature keeps data on disk / in Logseq and avoids SQLite, Postgres, Redis, or other central stores.
    validations:
      required: true

  - type: checkboxes
    id: paradigm_checks
    attributes:
      label: Paradigm checklist
      options:
        - label: Keeps graph content in Logseq Markdown on disk — no new system-of-record database
          required: true
        - label: Respects the outliner model (blocks, nesting, `id::`) rather than flat document blobs
          required: true
        - label: Respects OCC (Phase-1 snapshot + Phase-2 mtime verification) for any new mutator
          required: false
        - label: Respects AST parity (frontmatter, multiline padding, CRLF-safe I/O) for any graph write
          required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you evaluate, and why is your proposal better?
    validations:
      required: false

  - type: checkboxes
    id: local_checks
    attributes:
      label: Local validation
      options:
        - label: I ran `make check` on a prototype branch (if applicable)
          required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Example Markdown, mock tool schemas, or links to Logseq docs.
    validations:
      required: false
