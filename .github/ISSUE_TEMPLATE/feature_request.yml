name: Feature Request
description: Propose an improvement aligned with daemon-first, local-first Matryca Plumber
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        **Matryca Plumber** is an **autonomous**, **local-first** background AI **daemon** for **Logseq OG**. It is the graph's **headless mutation plane** on pure Markdown — not a passive editor plugin.

        **v2.0 note:** The planned **Shadow DB** (`shadow.sqlite`) is a daemon-owned **read cache**, not a system of record. Logseq Markdown on disk remains authoritative. Proposals that add hosted databases, cloud sync as a hard dependency, or unstructured page blobs are usually out of scope.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What pain point or gap does this address? Who benefits?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Concrete behavior — tools, daemon modules, docs, or UI changes.
    validations:
      required: true

  - type: textarea
    id: paradigm_alignment
    attributes:
      label: How does this align with local-first philosophy?
      description: Explain why the feature keeps Logseq Markdown as system of record. Shadow DB cache proposals must state they are read-only mirrors, not new sources of truth.
    validations:
      required: true

  - type: checkboxes
    id: paradigm_checks
    attributes:
      label: Paradigm checklist
      options:
        - label: Logseq Markdown stays system of record — no Postgres/Redis/cloud system-of-record; Shadow DB (if any) is a read-only daemon cache only
          required: true
        - label: Block-shaped thinking — respects the outliner model (blocks, nesting, `id::`) rather than flat document blobs
          required: true
        - label: Strict OCC — Phase-1 snapshot + Phase-2 mtime verification for any new mutator
          required: true
        - label: Respects AST parity (frontmatter, multiline padding, CRLF-safe I/O) for any graph write
          required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you evaluate, and why is your proposal better?
    validations:
      required: false

  - type: checkboxes
    id: local_checks
    attributes:
      label: Local validation
      options:
        - label: I ran `make check` on a prototype branch (if applicable)
          required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Example Markdown, mock tool schemas, or links to Logseq docs.
    validations:
      required: false
