name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Dependency review
        uses: actions/dependency-review-action@v5

  ironclad-gatekeeper:
    name: Ironclad Gatekeeper
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install uv and Python 3.12
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.12"
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Sync Python dependencies
        run: uv sync --locked --extra dev

      - name: Version consistency (pyproject.toml vs llms.txt)
        run: uv run python scripts/check_version_consistency.py

      - name: Build React cockpit
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run test
          npm run build

      - name: Run CI gate (format check, Ruff, Mypy, Pytest)
        run: make ci
