name: Daily Metrics Saver

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  save-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Genera ed Esegui Script Python
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
          REPO_SLUG: ${{ github.repository }}
        run: |
          cat > update_metrics.py << 'EOF'
          import os, json, sys, datetime
          from urllib.request import Request, urlopen
          from urllib.error import HTTPError

          token = os.environ.get('GITHUB_TOKEN', '')
          repo = os.environ.get('REPO_SLUG', '')

          if not token:
              print("❌ ERRORE: METRICS_TOKEN mancante!")
              print("Devi creare un Personal Access Token e salvarlo in Settings -> Secrets and variables -> Actions come METRICS_TOKEN.")
              sys.exit(1)

          headers = {
              'Authorization': f'token {token}',
              'Accept': 'application/vnd.github.v3+json'
          }

          def fetch_api(url):
              req = Request(url, headers=headers)
              try:
                  with urlopen(req) as response:
                      return json.loads(response.read().decode('utf-8'))
              except HTTPError as e:
                  print(f"❌ ERRORE HTTP {e.code} su {url}")
                  if e.code in (401, 403, 404):
                      print("-> IL TUO TOKEN NON HA I PERMESSI. Assicurati di aver spuntato la casella 'repo' quando hai generato il token, o di averlo salvato correttamente nei Secrets!")
                  sys.exit(1)
              except Exception as e:
                  print(f"❌ Errore sconosciuto su {url}: {e}")
                  sys.exit(1)

          print("Recupero Views...")
          views_data = fetch_api(f"https://api.github.com/repos/{repo}/traffic/views")
          
          print("Recupero Clones...")
          clones_data = fetch_api(f"https://api.github.com/repos/{repo}/traffic/clones")
          
          print("Recupero Releases...")
          releases_data = fetch_api(f"https://api.github.com/repos/{repo}/releases")

          os.makedirs('metrics', exist_ok=True)
          history_file = 'metrics/history.json'
          history = {'views': {}, 'clones': {}, 'releases': {}}

          if os.path.exists(history_file):
              try:
                  with open(history_file, 'r', encoding='utf-8') as f:
                      history = json.load(f)
              except Exception:
                  pass

          for key in ['views', 'clones', 'releases']:
              if key not in history:
                  history[key] = {}

          if isinstance(views_data, dict) and 'views' in views_data:
              for v in views_data['views']:
                  day = v.get('timestamp', '')[:10]
                  if day:
                      history['views'][day] = {'count': v.get('count', 0), 'uniques': v.get('uniques', 0)}

          if isinstance(clones_data, dict) and 'clones' in clones_data:
              for c in clones_data['clones']:
                  day = c.get('timestamp', '')[:10]
                  if day:
                      history['clones'][day] = {'count': c.get('count', 0), 'uniques': c.get('uniques', 0)}

          if isinstance(releases_data, list):
              today = datetime.datetime.now(datetime.timezone.utc).strftime('%Y-%m-%d')
              history['releases'][today] = [
                  {
                      'tag': r.get('tag_name', ''),
                      'assets': [{a.get('name', 'unknown'): a.get('download_count', 0)} for a in r.get('assets', [])]
                  }
                  for r in releases_data if isinstance(r, dict)
              ]

          with open(history_file, 'w', encoding='utf-8') as f:
              json.dump(history, f, indent=2)

          v_count = views_data.get('count', 0) if isinstance(views_data, dict) else 0
          c_count = clones_data.get('count', 0) if isinstance(clones_data, dict) else 0

          with open('metrics/views-badge.json', 'w', encoding='utf-8') as f:
              json.dump({"schemaVersion": 1, "label": "Views (14d)", "message": str(v_count), "color": "blue"}, f)

          with open('metrics/clones-badge.json', 'w', encoding='utf-8') as f:
              json.dump({"schemaVersion": 1, "label": "Clones (14d)", "message": str(c_count), "color": "success"}, f)

          print("✓ Salvataggio completato con successo!")
          EOF
          
          # Esegue lo script generato
          python update_metrics.py

      - name: Commit & Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add metrics/
          
          # Fa il commit solo se ci sono file effettivamente modificati
          if ! git diff --staged --quiet; then
            git commit -m "chore(analytics): archive daily repository metrics and badges [skip ci]"
            git push
          else
            echo "Nessuna nuova metrica da salvare oggi."
          fi
